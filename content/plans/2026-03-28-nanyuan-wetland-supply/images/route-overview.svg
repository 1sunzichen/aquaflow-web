<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" fill="none">
  <rect width="1200" height="700" rx="36" fill="#F5FBFF"/>
  <rect x="60" y="60" width="1080" height="580" rx="28" fill="#FFFFFF" stroke="#D6ECFF" stroke-width="4"/>
  <!-- 路线曲线：新发地 → 补给节点 → 南苑湿地草坪 → 和义站 -->
