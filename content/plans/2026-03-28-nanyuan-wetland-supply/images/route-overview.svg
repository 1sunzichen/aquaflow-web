  <text x="820" y="238" fill="#183B56" font-size="32" font-family="Arial, sans-serif">南苑湿地草坪</text>
  <text x="820" y="274" fill="#888" font-size="24" font-family="Arial, sans-serif">15:30 · 桌游 · 飞盘</text>
