  <text x="90" y="560" fill="#183B56" font-size="32" font-family="Arial, sans-serif">新发地站 A 口</text>
  <text x="90" y="598" fill="#888" font-size="24" font-family="Arial, sans-serif">14:00 集合 · 采购补给</text>
